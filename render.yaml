services:
  - type: web
    name: skillsphere-ml-service
    env: python
    buildCommand: "cd ml-service && pip install -r requirements.txt"
    startCommand: "cd ml-service && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8000

  - type: web
    name: skillsphere-server
    env: node
    buildCommand: "cd server && npm install"
    startCommand: "cd server && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ML_SERVICE_URL
        value: "https://skillsphere-ml-service.onrender.com" # Replace with actual deployed ML service URL
      - key: CORS_ALLOWED_ORIGINS
        value: "https://skillsphere.vercel.app" # Replace with actual Vercel client URL
